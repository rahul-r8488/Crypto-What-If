version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - COINLAYER_API_KEY=${COINLAYER_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on: []
    restart: unless-stopped

  # ── Frontend Dev Server ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: cryptowhatif-network
